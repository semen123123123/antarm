services:
  - type: web
    name: ant-arm-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ROBOKASSA_SHOP_ID
        sync: false
      - key: ROBOKASSA_PASS_1
        sync: false
      - key: ROBOKASSA_PASS_2
        sync: false
      - key: ROBOKASSA_TEST
        value: "false"
      - key: CORS_ORIGIN
        value: "https://antarm.ru"
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
